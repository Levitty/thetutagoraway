<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutagora - Africa's Learning Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 2;
            max-width: 1000px;
            padding: 60px 80px;
        }

        .logo-text {
            font-size: 120px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .tagline {
            font-size: 44px;
            font-weight: 600;
            margin-bottom: 40px;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 32px;
            font-weight: 500;
            opacity: 0.9;
            line-height: 1.4;
        }

        /* Decorative elements */
        .decoration {
            position: absolute;
            opacity: 0.15;
            z-index: 1;
        }

        .circle1 {
            width: 400px;
            height: 400px;
            background: white;
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .circle2 {
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
        }
    </style>
</head>
<body>
    <div class="decoration circle1"></div>
    <div class="decoration circle2"></div>

    <div class="container">
        <div class="logo-text">Tutagora</div>
        <div class="tagline">Africa's Learning Platform</div>
        <div class="description">Find verified tutors for one-on-one lessons</div>
    </div>
</body>
</html>
